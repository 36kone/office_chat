<!doctype html>
<html lang="pt-br">
    <head>
        <meta charset="UTF-8" />
        <title>Usuários</title>

        <style>
            body {
                margin: 0;
                font-family: Arial, sans-serif;
                background: #f6f7f9;
            }

            /* Container */

            .container {
                max-width: 1100px;
                margin: 40px auto;
                background: white;
                padding: 30px;
                border-radius: 12px;
                box-shadow: 0 4px 20px rgb(0 0 0 / 0.08);
            }

            .header {
                display: flex;
                justify-content: space-between;
                align-items: center;
                margin-bottom: 25px;
            }

            h1 {
                margin: 0;
            }

            /* Top actions */

            .actions {
                display: flex;
                gap: 10px;
                align-items: center;
            }

            .search-input {
                padding: 10px 15px;
                border-radius: 25px;
                border: 1px solid #ccc;
                width: 250px;
            }

            .btn-primary {
                background: black;
                color: white;
                border: none;
                padding: 10px 18px;
                border-radius: 25px;
                cursor: pointer;
                font-weight: bold;
            }

            /* Table */

            table {
                width: 100%;
                border-collapse: collapse;
            }

            thead {
                background: #f9f9f9;
            }

            th,
            td {
                padding: 14px;
                text-align: left;
                border-bottom: 1px solid #eee;
                font-size: 14px;
            }

            tbody tr:hover {
                background: #f5f5f5;
            }

            /* Icons */

            .icon-btn {
                cursor: pointer;
                margin-right: 10px;
                font-size: 16px;
            }

            .icon-edit {
                color: #333;
            }

            .icon-delete {
                color: #e53935;
            }

            /* Pagination */

            .pagination {
                display: flex;
                justify-content: flex-end;
                margin-top: 20px;
                gap: 5px;
            }

            .page-item {
                padding: 6px 12px;
                border-radius: 6px;
                border: 1px solid #ddd;
                cursor: pointer;
                font-size: 13px;
            }

            .page-item.active {
                background: black;
                color: white;
                border-color: black;
            }

            /* Modal */

            .modal {
                display: none;
                position: fixed;
                inset: 0;
                background: rgba(0, 0, 0, 0.4);
                align-items: center;
                justify-content: center;
            }

            .modal-content {
                width: 400px;
                background: white;
                padding: 30px;
                border-radius: 12px;
            }

            .modal-content h2 {
                margin-top: 0;
            }

            .modal-content form {
                display: flex;
                flex-direction: column;
                gap: 15px;
            }

            .modal-content input {
                padding: 10px;
                border-radius: 8px;
                border: 1px solid #ccc;
            }

            .modal-actions {
                display: flex;
                justify-content: space-between;
                margin-top: 15px;
            }

            .btn-secondary {
                background: #ddd;
                border: none;
                padding: 8px 14px;
                border-radius: 20px;
                cursor: pointer;
            }

            .close {
                cursor: pointer;
                float: right;
                font-size: 18px;
            }
        </style>
    </head>
    <body>
        <div class="container">
            <div class="header">
                <h1>Usuários do Sistema</h1>

                <div class="actions">
                    <input
                        type="text"
                        class="search-input"
                        placeholder="Buscar usuário..."
                    />
                    <button class="btn-primary" onclick="openModal()">
                        Criar novo usuário
                    </button>
                </div>
            </div>

            <table>
                <thead>
                    <tr>
                        <th>Nome</th>
                        <th>Email</th>
                        <th>Data de criação</th>
                        <th style="width: 120px">Ações</th>
                    </tr>
                </thead>
                <tbody>
                    {% for user in users %}
                    <tr>
                        <td>{{ user.name }}</td>
                        <td>{{ user.email }}</td>
                        <td>{{ user.created_at }}</td>
                        <td>
                            <span
                                class="icon-btn icon-edit"
                                onclick="editUser('{{ user.id }}', '{{ user.name }}', '{{ user.email }}')"
                                >✏️</span
                            >
                            <span
                                class="icon-btn icon-delete"
                                onclick="deleteUser('{{ user.id }}')"
                                >🗑️</span
                            >
                        </td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>

            <!-- Paginação -->
            <div class="pagination">
                <div class="page-item">«</div>

                {% for page in page_range %}
                <div
                    class="page-item {% if page == current_page %}active{% endif %}"
                >
                    {{ page }}
                </div>
                {% endfor %}

                <div class="page-item">»</div>
            </div>
        </div>

        <!-- Modal Criar / Editar -->

        <div class="modal" id="userModal">
            <div class="modal-content">
                <span class="close" onclick="closeModal()">✖</span>
                <h2 id="modalTitle">Criar Usuário</h2>

                <form method="POST" id="userForm">
                    {% csrf_token %}
                    <input type="hidden" name="user_id" id="userId" />

                    <input
                        type="text"
                        name="name"
                        id="userName"
                        placeholder="Nome"
                        required
                    />
                    <input
                        type="email"
                        name="email"
                        id="userEmail"
                        placeholder="Email"
                        required
                    />
                    <input
                        type="password"
                        name="password"
                        placeholder="Senha"
                    />

                    <div class="modal-actions">
                        <button
                            type="button"
                            class="btn-secondary"
                            onclick="closeModal()"
                        >
                            Cancelar
                        </button>
                        <button type="submit" class="btn-primary">
                            Salvar
                        </button>
                    </div>
                </form>
            </div>
        </div>

        <script>
            function openModal() {
                document.getElementById("modalTitle").innerText =
                    "Criar Usuário";
                document.getElementById("userForm").reset();
                document.getElementById("userId").value = "";
                document.getElementById("userModal").style.display = "flex";
            }

            function editUser(id, name, email) {
                document.getElementById("modalTitle").innerText =
                    "Editar Usuário";
                document.getElementById("userId").value = id;
                document.getElementById("userName").value = name;
                document.getElementById("userEmail").value = email;
                document.getElementById("userModal").style.display = "flex";
            }

            function closeModal() {
                document.getElementById("userModal").style.display = "none";
            }

            function deleteUser(id) {
                if (confirm("Tem certeza que deseja deletar este usuário?")) {
                    window.location.href = "/admin/users/delete/" + id + "/";
                }
            }
        </script>
    </body>
</html>
