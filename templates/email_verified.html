<!doctype html>
<html>
    <head>
        <meta charset="UTF-8" />
        <title>E-mail Verificado</title>

        <style>
            body {
                background: #f6f7f9;
                font-family: Arial;
                display: flex;
                justify-content: center;
                align-items: center;
                height: 100vh;
            }

            .box {
                background: white;
                padding: 40px;
                border-radius: 12px;
                box-shadow: 0 4px 20px rgb(0 0 0 / 0.08);
                text-align: center;
            }

            h1 {
                margin-bottom: 15px;
            }

            a {
                display: inline-block;
                margin-top: 20px;
                background: black;
                color: white;
                padding: 10px 20px;
                border-radius: 20px;
                text-decoration: none;
            }
        </style>
    </head>
    <body>
        <div class="box">
            <h1>✅ E-mail verificado!</h1>
            <p>Sua conta foi ativada com sucesso.</p>

            <a href="{% url 'login' %}">Ir para login</a>
        </div>
    </body>
</html>
