<!doctype html>
<html lang="pt-br">
    <head>
        <meta charset="UTF-8" />
        <title>Usuários</title>

        <style>
            body {
                margin: 0;
                font-family: Arial, sans-serif;
                background-color: #f6f7f9;
            }

            .container {
                padding: 30px;
            }

            .header {
                display: flex;
                align-items: center;
                justify-content: space-between;
            }

            .title {
                font-size: 28px;
                font-weight: bold;
            }

            .actions {
                display: flex;
                gap: 10px;
            }

            .search-input {
                width: 300px;
                padding: 10px;
                border-radius: 8px;
                border: 1px solid #ddd;
            }

            .select {
                padding: 10px;
                border-radius: 8px;
                border: 1px solid #ddd;
            }

            .btn-new {
                background: black;
                color: white;
                border: none;
                padding: 10px 16px;
                border-radius: 20px;
                cursor: pointer;
            }

            .user-list {
                margin-top: 30px;
                background: white;
                border-radius: 10px;
                overflow: hidden;
            }

            .user-item {
                display: flex;
                align-items: center;
                justify-content: space-between;
                padding: 18px 20px;
                border-bottom: 1px solid #eee;
            }

            .user-info {
                display: flex;
                flex-direction: column;
            }

            .user-name {
                font-weight: bold;
            }

            .user-email {
                color: #777;
                font-size: 14px;
            }

            .badges {
                display: flex;
                gap: 8px;
                align-items: center;
            }

            .badge-role {
                background: #f0f0f0;
                padding: 4px 10px;
                border-radius: 12px;
                font-size: 12px;
            }

            .badge-status {
                background: #e6f9ec;
                color: #2ecc71;
                padding: 4px 10px;
                border-radius: 12px;
                font-size: 12px;
            }

            .chat-button {
                position: fixed;
                bottom: 30px;
                right: 30px;
                background: black;
                width: 60px;
                height: 60px;
                border-radius: 50%;
                border: none;
                color: white;
                font-size: 22px;
                cursor: pointer;
            }

            /* Modal */
            .modal {
                display: none;
                position: fixed;
                inset: 0;
                background: rgba(0, 0, 0, 0.4);
                align-items: center;
                justify-content: center;
            }

            .modal-content {
                width: 700px;
                height: 500px;
                background: white;
                border-radius: 12px;
                overflow: hidden;
                display: flex;
                flex-direction: column;
            }

            .modal-header {
                padding: 15px;
                background: #111;
                color: white;
                display: flex;
                justify-content: space-between;
            }

            .close {
                cursor: pointer;
            }
        </style>
    </head>

    <body>
        <div class="container">
            <div class="header">
                <div class="title">Usuários</div>
                <div class="actions">
                    <input class="search-input" placeholder="Pesquisar por" />
                    <select class="select">
                        <option>Todos</option>
                        <option>Administrador</option>
                        <option>Agente</option>
                    </select>
                    <button class="btn-new">+ Novo</button>
                </div>
            </div>

            <div class="user-list">
                {% for user in users %}
                <div class="user-item">
                    <div class="user-info">
                        <div class="user-name">{{ user.name }}</div>
                        <div class="user-email">{{ user.email }}</div>
                    </div>

                    <div class="badges">
                        <div class="badge-role">{{ user.role }}</div>
                        <div class="badge-status">Ativo</div>
                    </div>
                </div>
                {% endfor %}
            </div>
        </div>

        <button class="chat-button" onclick="openChat()">💬</button>

        {% include 'chat.html' %}

        <script>
            function openChat() {
                document.getElementById("chatModal").style.display = "flex";
            }

            function closeChat() {
                document.getElementById("chatModal").style.display = "none";
            }
        </script>
    </body>
</html>
