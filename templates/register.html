<!doctype html>
<html lang="pt-br">
    <head>
        <meta charset="UTF-8" />
        <title>Cadastro de Usuário</title>
        <style>
            body {
                background: #f6f7f9;
                font-family: Arial, sans-serif;
                margin: 0;
            }

            .container {
                max-width: 400px;
                margin: 80px auto;
                background: white;
                padding: 30px;
                border-radius: 10px;
                box-shadow: 0 4px 15px rgb(0 0 0 / 0.1);
            }

            h1 {
                margin-bottom: 24px;
                font-weight: bold;
                color: #222;
                font-size: 24px;
            }

            form {
                display: flex;
                flex-direction: column;
                gap: 16px;
            }

            label {
                font-weight: 600;
                font-size: 14px;
            }

            input[type="text"],
            input[type="email"],
            input[type="password"] {
                padding: 10px;
                border-radius: 8px;
                border: 1px solid #ccc;
                font-size: 14px;
                width: 100%;
                box-sizing: border-box;
            }

            button {
                background: black;
                color: white;
                padding: 12px;
                font-weight: bold;
                border: none;
                border-radius: 25px;
                cursor: pointer;
                font-size: 16px;
            }

            button:hover {
                background: #222;
            }
        </style>
    </head>
    <body>
        <div class="container">
            <h1>Cadastro de Usuário</h1>
            <form method="POST" action="{% url 'register' %}">
                {% csrf_token %}
                <label for="name">Nome completo</label>
                <input type="text" id="name" name="name" required />

                <label for="email">E-mail</label>
                <input type="email" id="email" name="email" required />

                <label for="password">Senha</label>
                <input type="password" id="password" name="password" required />

                <label for="password2">Confirme a senha</label>
                <input
                    type="password"
                    id="password2"
                    name="password2"
                    required
                />

                <button type="submit">Cadastrar</button>
            </form>
        </div>
    </body>
</html>
