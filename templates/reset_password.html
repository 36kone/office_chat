<!doctype html>
<html lang="pt-br">
    <head>
        <meta charset="UTF-8" />
        <title>Recuperar Senha</title>
        <style>
            body {
                background: #f6f7f9;
                font-family: Arial, sans-serif;
                margin: 0;
            }

            .container {
                max-width: 400px;
                margin: 80px auto;
                background: white;
                padding: 30px;
                border-radius: 10px;
                box-shadow: 0 4px 15px rgb(0 0 0 / 0.1);
            }

            h1 {
                margin-bottom: 24px;
                font-weight: bold;
                font-size: 24px;
                color: #222;
            }

            form {
                display: flex;
                flex-direction: column;
                gap: 16px;
            }

            input[type="email"] {
                padding: 10px;
                border-radius: 8px;
                border: 1px solid #ccc;
                font-size: 14px;
                width: 100%;
                box-sizing: border-box;
            }

            button {
                background: black;
                color: white;
                padding: 12px;
                font-weight: bold;
                border: none;
                border-radius: 25px;
                cursor: pointer;
                font-size: 16px;
            }

            button:hover {
                background: #222;
            }
        </style>
    </head>
    <body>
        <div class="container">
            <h1>Recuperar Senha</h1>
            <form method="POST" action="{% url 'password_reset' %}">
                {% csrf_token %}
                <label for="email">Informe seu e-mail</label>
                <input
                    type="email"
                    id="email"
                    name="email"
                    placeholder="E-mail"
                    required
                />

                <button type="submit">Enviar link de recuperação</button>
            </form>
        </div>
    </body>
</html>
