{% extends "base.html" %} {% block title %}Logs de Auditoria{% endblock %} {%
block content %}

<h1>Logs de Auditoria</h1>

<table
    style="
        width: 100%;
        background: white;
        border-radius: 10px;
        overflow: hidden;
    "
>
    <thead style="background: #f5f5f5">
        <tr>
            <th style="padding: 12px">Usuário</th>
            <th>Ação</th>
            <th>Chat</th>
            <th>IP</th>
            <th>Data</th>
        </tr>
    </thead>
    <tbody>
        {% for log in logs %}
        <tr style="border-bottom: 1px solid #eee">
            <td style="padding: 12px">{{ log.user }}</td>
            <td>{{ log.action }}</td>
            <td>{{ log.chat }}</td>
            <td>{{ log.ip }}</td>
            <td>{{ log.created_at }}</td>
        </tr>
        {% endfor %}
    </tbody>
</table>

{% endblock %}
