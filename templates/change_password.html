<!doctype html>
<html lang="pt-br">
    <head>
        <meta charset="UTF-8" />
        <title>Configurações</title>
        <style>
            body {
                background: #f6f7f9;
                font-family: Arial, sans-serif;
                margin: 0;
            }

            .container {
                max-width: 400px;
                margin: 50px auto;
                background: white;
                padding: 30px;
                border-radius: 10px;
                box-shadow: 0 4px 15px rgb(0 0 0 / 0.1);
            }

            h1 {
                margin-bottom: 24px;
                font-weight: bold;
                font-size: 24px;
            }

            form {
                display: flex;
                flex-direction: column;
                gap: 16px;
            }

            label {
                font-weight: 600;
                font-size: 14px;
            }

            input[type="password"] {
                padding: 10px;
                border-radius: 8px;
                border: 1px solid #ccc;
                font-size: 14px;
                width: 100%;
                box-sizing: border-box;
            }

            button {
                background: black;
                color: white;
                padding: 12px;
                font-weight: bold;
                border: none;
                border-radius: 25px;
                cursor: pointer;
                font-size: 16px;
            }

            button:hover {
                background: #222;
            }
        </style>
    </head>
    <body>
        <div class="container">
            <h1>Configurações - Alterar Senha</h1>
            <form method="POST" action="{% url 'settings' %}">
                {% csrf_token %}
                <label for="current_password">Senha Atual</label>
                <input
                    type="password"
                    id="current_password"
                    name="current_password"
                    required
                />

                <label for="new_password">Nova Senha</label>
                <input
                    type="password"
                    id="new_password"
                    name="new_password"
                    required
                />

                <label for="new_password2">Confirme a Nova Senha</label>
                <input
                    type="password"
                    id="new_password2"
                    name="new_password2"
                    required
                />

                <button type="submit">Alterar Senha</button>
            </form>
        </div>
    </body>
</html>
