<!doctype html>
<html>
    <head>
        <meta charset="UTF-8" />
        <title>Verifique seu e-mail</title>

        <style>
            body {
                background: #f6f7f9;
                font-family: Arial;
                display: flex;
                justify-content: center;
                align-items: center;
                height: 100vh;
            }

            .box {
                background: white;
                padding: 40px;
                border-radius: 12px;
                box-shadow: 0 4px 20px rgb(0 0 0 / 0.08);
                text-align: center;
                max-width: 400px;
            }

            h1 {
                margin-bottom: 15px;
            }

            p {
                color: #555;
            }

            button {
                margin-top: 20px;
                background: black;
                color: white;
                padding: 10px 20px;
                border: none;
                border-radius: 20px;
                cursor: pointer;
            }
        </style>
    </head>
    <body>
        <div class="box">
            <h1>Verifique seu e-mail 📩</h1>
            <p>
                Enviamos um link de verificação para seu e-mail. Clique no link
                para ativar sua conta.
            </p>

            <button onclick="location.href='{% url 'resend_verification' %}'">
                Reenviar e-mail
            </button>
        </div>
    </body>
</html>
