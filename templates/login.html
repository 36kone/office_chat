<!doctype html>
<html lang="pt-br">
    <head>
        <meta charset="UTF-8" />
        <title>Login</title>
        <style>
            body {
                background: #f6f7f9;
                font-family: Arial, sans-serif;
                margin: 0;
            }

            .container {
                max-width: 400px;
                margin: 80px auto;
                background: white;
                padding: 30px;
                border-radius: 10px;
                box-shadow: 0 4px 15px rgb(0 0 0 / 0.1);
            }

            h1 {
                margin-bottom: 24px;
                font-weight: bold;
                font-size: 24px;
                color: #222;
            }

            form {
                display: flex;
                flex-direction: column;
                gap: 16px;
            }

            input[type="email"],
            input[type="password"] {
                padding: 10px;
                border-radius: 8px;
                border: 1px solid #ccc;
                font-size: 14px;
                width: 100%;
                box-sizing: border-box;
            }

            button {
                background: black;
                color: white;
                padding: 12px;
                font-weight: bold;
                border: none;
                border-radius: 25px;
                cursor: pointer;
                font-size: 16px;
            }

            button:hover {
                background: #222;
            }

            .forgot-link {
                font-size: 13px;
                color: #666;
                text-align: right;
                margin-top: -10px;
                margin-bottom: 10px;
                cursor: pointer;
                text-decoration: underline;
            }
        </style>
    </head>
    <body>
        <div class="container">
            <h1>Login</h1>
            <form method="POST" action="{% url 'login' %}">
                {% csrf_token %}
                <input
                    type="email"
                    name="email"
                    placeholder="E-mail"
                    required
                />
                <input
                    type="password"
                    name="password"
                    placeholder="Senha"
                    required
                />

                <div
                    class="forgot-link"
                    onclick="location.href='{% url 'password_reset' %}'"
                >
                    Esqueci minha senha
                </div>

                <button type="submit">Entrar</button>
            </form>
        </div>
    </body>
</html>
