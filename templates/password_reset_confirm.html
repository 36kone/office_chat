<!doctype html>
<html>
    <head>
        <meta charset="UTF-8" />
        <title>Redefinir Senha</title>

        <style>
            body {
                background: #f6f7f9;
                font-family: Arial;
                margin: 0;
            }

            .container {
                max-width: 400px;
                margin: 80px auto;
                background: white;
                padding: 30px;
                border-radius: 12px;
                box-shadow: 0 4px 20px rgb(0 0 0 / 0.08);
            }

            h1 {
                margin-bottom: 20px;
            }

            form {
                display: flex;
                flex-direction: column;
                gap: 15px;
            }

            input {
                padding: 10px;
                border-radius: 8px;
                border: 1px solid #ccc;
            }

            button {
                background: black;
                color: white;
                padding: 12px;
                border: none;
                border-radius: 25px;
                cursor: pointer;
                font-weight: bold;
            }
        </style>
    </head>
    <body>
        <div class="container">
            <h1>Redefinir Senha</h1>

            <form method="POST">
                {% csrf_token %}
                <input
                    type="password"
                    name="new_password1"
                    placeholder="Nova senha"
                    required
                />
                <input
                    type="password"
                    name="new_password2"
                    placeholder="Confirme a nova senha"
                    required
                />
                <button type="submit">Salvar nova senha</button>
            </form>
        </div>
    </body>
</html>
