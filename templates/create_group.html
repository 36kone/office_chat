<!doctype html>
<html lang="pt-br">
    <head>
        <meta charset="UTF-8" />
        <title>Criar Grupo</title>

        <style>
            body {
                margin: 0;
                font-family: Arial, sans-serif;
                background: #f6f7f9;
            }

            .container {
                max-width: 600px;
                margin: 50px auto;
                background: white;
                padding: 30px;
                border-radius: 12px;
                box-shadow: 0 4px 20px rgb(0 0 0 / 0.08);
            }

            h1 {
                margin-bottom: 25px;
            }

            form {
                display: flex;
                flex-direction: column;
                gap: 18px;
            }

            input[type="text"],
            textarea,
            select {
                padding: 10px;
                border-radius: 8px;
                border: 1px solid #ccc;
                font-size: 14px;
                width: 100%;
            }

            textarea {
                resize: vertical;
                height: 80px;
            }

            .members-box {
                max-height: 150px;
                overflow-y: auto;
                border: 1px solid #ddd;
                border-radius: 8px;
                padding: 10px;
            }

            .member-item {
                display: flex;
                align-items: center;
                gap: 10px;
                margin-bottom: 8px;
            }

            button {
                background: black;
                color: white;
                border: none;
                padding: 12px;
                border-radius: 25px;
                cursor: pointer;
                font-weight: bold;
            }
        </style>
    </head>

    <body>
        <div class="container">
            <h1>Criar Novo Grupo</h1>

            <form method="POST" enctype="multipart/form-data">
                {% csrf_token %}

                <input
                    type="text"
                    name="name"
                    placeholder="Nome do grupo"
                    required
                />

                <textarea
                    name="description"
                    placeholder="Descrição do grupo"
                ></textarea>

                <label>Foto do grupo</label>
                <input type="file" name="avatar" accept="image/*" />

                <label>Adicionar membros</label>
                <div class="members-box">
                    {% for user in users %}
                    <div class="member-item">
                        <input
                            type="checkbox"
                            name="members"
                            value="{{ user.id }}"
                        />
                        <span>{{ user.name }}</span>
                    </div>
                    {% endfor %}
                </div>

                <button type="submit">Criar Grupo</button>
            </form>
        </div>
    </body>
</html>
