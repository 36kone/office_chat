<!-- appbar.html -->
<style>
    .appbar {
        display: flex;
        align-items: center;
        justify-content: flex-end;
        background: white;
        padding: 8px 20px;
        box-shadow: 0 2px 6px rgb(0 0 0 / 0.1);
        position: relative;
        font-family: Arial, sans-serif;
    }

    .icon-button {
        position: relative;
        margin-right: 20px;
        cursor: pointer;
        font-size: 20px;
        color: #444;
    }

    .icon-button .badge {
        position: absolute;
        top: -4px;
        right: -6px;
        width: 10px;
        height: 10px;
        background: #e03e3e;
        border-radius: 50%;
    }

    .avatar-wrapper {
        position: relative;
        cursor: pointer;
    }

    .avatar {
        width: 36px;
        height: 36px;
        border-radius: 50%;
        object-fit: cover;
        border: 2px solid #eee;
    }

    .status-green {
        position: absolute;
        bottom: 0;
        right: 0;
        width: 10px;
        height: 10px;
        background: #4caf50;
        border: 2px solid white;
        border-radius: 50%;
    }

    /* Dropdown */

    .dropdown-menu {
        display: none;
        position: absolute;
        right: 0;
        top: 48px;
        background: white;
        width: 220px;
        box-shadow: 0 6px 12px rgba(0, 0, 0, 0.1);
        border-radius: 8px;
        font-size: 14px;
        color: #333;
        font-family: Arial, sans-serif;
        z-index: 100;
    }

    .dropdown-menu.active {
        display: block;
    }

    .dropdown-header {
        padding: 12px 16px;
        border-bottom: 1px solid #eee;
    }

    .dropdown-header strong {
        display: block;
        font-weight: 700;
    }

    .dropdown-header small {
        font-size: 12px;
        color: #777;
    }

    .badge-role {
        background: #b0b0b0;
        color: white;
        padding: 2px 8px;
        font-size: 11px;
        border-radius: 12px;
        margin-top: 6px;
        display: inline-block;
    }

    .dropdown-list {
        list-style: none;
        padding: 0;
        margin: 0;
    }

    .dropdown-list li {
        border-bottom: 1px solid #eee;
    }

    .dropdown-list li:last-child {
        border-bottom: none;
    }

    .dropdown-list button {
        width: 100%;
        padding: 10px 16px;
        background: none;
        border: none;
        cursor: pointer;
        text-align: left;
        display: flex;
        align-items: center;
        gap: 8px;
        color: #333;
    }

    .dropdown-list button:hover {
        background: #f5f5f5;
    }

    .dropdown-list svg {
        fill: #666;
        width: 18px;
        height: 18px;
        flex-shrink: 0;
    }

    .dropdown-footer {
        font-size: 10px;
        color: #aaa;
        text-align: center;
        padding: 8px;
        border-top: 1px solid #eee;
    }
</style>

<div class="appbar">
    <div class="icon-button" title="Chamadas">
        📞
        <span class="badge"></span>
    </div>

    <div class="icon-button" title="Notificações">🔔</div>

    <div class="avatar-wrapper" id="avatarWrapper" onclick="toggleDropdown()">
        <img class="avatar" src="{{ user.avatar_url }}" alt="Avatar" />
        <span class="status-green"></span>

        <div class="dropdown-menu" id="avatarDropdown">
            <div class="dropdown-header">
                <strong>{{ user.name }}</strong>
                <small>{{ user.email }}</small>
                <span class="badge-role">{{ user.role }}</span>
            </div>
            <ul class="dropdown-list">
                <li>
                    <button onclick="location.href='{% url 'profile' %}'">
                        👤 Perfil
                    </button>
                </li>
                <li>
                    <button onclick="location.href='{% url 'settings' %}'">
                        ⚙️ Configurações
                    </button>
                </li>
                <li>
                    <button onclick="location.href='{% url 'logout' %}'">
                        🚪 Sign out
                    </button>
                </li>
            </ul>
            <div class="dropdown-footer">versão 1.0.297-stg (0.363)</div>
        </div>
    </div>
</div>

<script>
    function toggleDropdown() {
        const dropdown = document.getElementById("avatarDropdown");
        dropdown.classList.toggle("active");
    }

    // Fecha dropdown se clicar fora
    document.addEventListener("click", function (event) {
        const wrapper = document.getElementById("avatarWrapper");
        if (!wrapper.contains(event.target)) {
            document
                .getElementById("avatarDropdown")
                .classList.remove("active");
        }
    });
</script>
